<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Procrastination Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Procrastination Timer</h1>
    <div class="cumulative-stats">
      <div id="focusTime">Cumulative Focus: 00:00</div>
      <div id="procrastinationTime">Cumulative Procrastination: 00:00 (0% focused)</div>
    </div>

    <div class="container">

    <div class="timer-wrapper">
    <svg class="timer-ring" viewBox="0 0 100 100">
      <!-- Background ring -->
      <circle
        class="ring-bg"
        cx="50"
        cy="50"
        r="45"
      />
      <!-- Progress ring -->
      <circle
        id="progress-ring-circle"
        class="ring-progress"
        cx="50"
        cy="50"
        r="45"
      />
      <!-- Timer text -->
      <text
        id="timer"
        x="50"
        y="50"
        text-anchor="middle"
        dominant-baseline="middle"
      >00:00</text>
      </svg>
    </div>

    <div id="roast"></div>
   
    <!-- Session name input -->
    <input type="text" id="sessionName" placeholder="Enter session name" />

    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="stopBtn">Stop</button>
      <button id="milestonesBtn">Milestones</button>
      <button id="chartsBtn">Charts</button>
      <button id="focusModeBtn">Focus Mode</button>
      <button id="leaderboardBtn">Leaderboards</button>

    </div>

    <!-- Streak display -->
    <div id="streakDiv"></div>
    <audio id="startSound" src="start.mp3"></audio>
    <audio id="pauseSound" src="airHorn.mp3"></audio>
    <audio id="stopSound" src="ding.mp3"></audio>

  </div>
 <img id="avatar" src="foxNeutral.png" alt="avatar" />
 
  <canvas id="weeklyChart"></canvas>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="script.js"></script>
</body>
</html>
